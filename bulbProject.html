<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulb Toggle</title>
</head>
<body>
  <h2>LED Turn Off/On 💡</h2>

  <!-- Turn On button -->
  <button onClick="document.getElementById('myImage').src='assests/Bulb_on.jpg'">
    Turn On The Light
  </button>

  <!-- Image starts OFF -->
  <img id="myImage" src="assests/Bulb_off.png" style="width: 300px;">

  <!-- Turn Off button -->
  <button onClick="document.getElementById('myImage').src='assests/Bulb_off.png'">
    Turn Off The Light
  </button>
</body>
</html>
