<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h2>What can javascript do?</h2>
   <p id ="demo1">javascript can change Html content.</p>
    <button type="button" onclick="document.getElementById('demo1').innerHTML = 'hello javascript'">
        Click me</button> 

   <!-- change the style of css -->
    <p>Javascript can change the style of an HTML element</p>
    <button type="button"onClick="document.getElementById('demo1').style.fontSize='35px'">Change front size</button>

    <!-- Hiding the text in  HTML -->
     <p>Javascript can hide the html element</p>
     <button onclick="document.getElementById('demo1').style.display='none'"> Hide text</button>

     <!-- show the hidden text -->
      <p>javascript can show hidden HTML element</p>
      <p id = "demo2" style="display: none;">Hello cutiepie😊</p>
      <button  type="button"onClick="document.getElementById('demo2').style.display='block'">Show Text</button>
</body>
</html>
